      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer1.director.certportal.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer2.director.certportal.com:10051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.director.certportal.com:9051
