      - ../../organizations/peerOrganizations/hr.certportal.com/peers/peer2.hr.certportal.com/tls:/etc/hyperledger/fabric/tls
      - ../../organizations/peerOrganizations/hr.certportal.com/peers/peer2.hr.certportal.com/production:/var/hyperledger/production
      - ../../peercfg/core.yaml:/etc/hyperledger/fabric/core.yaml
