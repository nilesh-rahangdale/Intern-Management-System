    volumes:
      - /var/run/:/host/var/run/
      - ../../organizations/peerOrganizations/director.certportal.com/peers/peer1.director.certportal.com/msp:/etc/hyperledger/fabric/msp
      - ../../organizations/peerOrganizations/director.certportal.com/peers/peer1.director.certportal.com/tls:/etc/hyperledger/fabric/tls
      - ../../organizations/peerOrganizations/director.certportal.com/peers/peer1.director.certportal.com/production:/var/hyperledger/production
