      - ../../organizations/ordererOrganizations/orderer.certportal.com/orderers/orderer1.orderer.certportal.com/msp:/var/hyperledger/orderer/msp
      - ../../organizations/ordererOrganizations/orderer.certportal.com/orderers/orderer1.orderer.certportal.com/tls:/var/hyperledger/orderer/tls
      - ../../organizations/ordererOrganizations/orderer.certportal.com/orderers/orderer1.orderer.certportal.com/production:/var/hyperledger/production/orderer
