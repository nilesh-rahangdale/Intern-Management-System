services:
  couchdb-hr-peer1:
    image: couchdb:${COUCHDB_VERSION}
    container_name: couchdb-hr-peer1
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    ports:
      - "${HR_PEER1_COUCHDB_PORT}:5984"
    networks:
      - test

  couchdb-hr-peer2:
    image: couchdb:${COUCHDB_VERSION}
    container_name: couchdb-hr-peer2
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    ports:
      - "${HR_PEER2_COUCHDB_PORT}:5984"
    networks:
      - test

  couchdb-director-peer1:
    image: couchdb:${COUCHDB_VERSION}
    container_name: couchdb-director-peer1
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    ports:
      - "${DIRECTOR_PEER1_COUCHDB_PORT}:5984"
    networks:
      - test

  couchdb-director-peer2:
    image: couchdb:${COUCHDB_VERSION}
    container_name: couchdb-director-peer2
    environment:
      - COUCHDB_USER=${COUCHDB_USER}
      - COUCHDB_PASSWORD=${COUCHDB_PASSWORD}
    ports:
      - "${DIRECTOR_PEER2_COUCHDB_PORT}:5984"
    networks:
      - test

  peer1-hr:
    image: hyperledger/fabric-peer:${FABRIC_VERSION}
    container_name: peer1.hr.certportal.com
    labels:
      service: hyperledger-fabric
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=drdo-blockchain-test
      - CORE_PEER_ID=peer1.hr.certportal.com
      - CORE_PEER_ADDRESS=peer1.hr.certportal.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer1.hr.certportal.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer2.hr.certportal.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer1.hr.certportal.com:7051
      - CORE_PEER_LOCALMSPID=HRMSP
      - CORE_PEER_MSPCONFIGPATH=/etc/hyperledger/fabric/msp
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb-hr-peer1:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=${COUCHDB_USER}
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=${COUCHDB_PASSWORD}
      - CORE_OPERATIONS_LISTENADDRESS=0.0.0.0:${HR_PEER1_OPERATIONS_PORT}
      - CORE_METRICS_PROVIDER=disabled
      - FABRIC_LOGGING_SPEC=INFO
    ports:
      - "${HR_PEER1_PORT}:7051"
      - "${HR_PEER1_CHAINCODE_PORT}:7052"
      - "${HR_PEER1_OPERATIONS_PORT}:${HR_PEER1_OPERATIONS_PORT}"
    volumes:
      - /var/run/:/host/var/run/
      - ../../organizations/peerOrganizations/hr.certportal.com/peers/peer1.hr.certportal.com/msp:/etc/hyperledger/fabric/msp
      - ../../organizations/peerOrganizations/hr.certportal.com/peers/peer1.hr.certportal.com/tls:/etc/hyperledger/fabric/tls
      - ../../organizations/peerOrganizations/hr.certportal.com/peers/peer1.hr.certportal.com/production:/var/hyperledger/production
      - ../../peercfg/core.yaml:/etc/hyperledger/fabric/core.yaml
    depends_on:
      - couchdb-hr-peer1
    networks:
      - test

