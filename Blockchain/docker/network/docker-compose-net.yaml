      - ../../organizations/peerOrganizations/director.certportal.com/peers/peer2.director.certportal.com/tls:/etc/hyperledger/fabric/tls
      - ../../organizations/peerOrganizations/director.certportal.com/peers/peer2.director.certportal.com/production:/var/hyperledger/production
